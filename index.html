<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon-32.png" type="image/png">
<title>Clip Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   THEME SYSTEM
   ═══════════════════════════════════════ */
:root, [data-theme="dark"] {
  --bg: #06060a;
  --bg-glass: rgba(14, 14, 22, 0.55);
  --bg-glass-solid: rgba(14, 14, 22, 0.8);
  --bg-glass-hover: rgba(22, 22, 36, 0.6);
  --bg-input: rgba(10, 10, 18, 0.7);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.16);
  --border-accent: rgba(120, 160, 255, 0.3);
  --accent: #7ba4f7;
  --accent-2: #c084fc;
  --accent-3: #34d399;
  --accent-soft: rgba(123, 164, 247, 0.12);
  --accent-glow: rgba(123, 164, 247, 0.06);
  --text: #e8e6f0;
  --text-2: #9895a8;
  --text-3: #5c5970;
  --text-4: #36343f;
  --red: #f47272;
  --green: #4ade80;
  --glass-blur: 20px;
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.4);
  --mesh-1: radial-gradient(ellipse 80% 60% at 10% 20%, rgba(123,164,247,0.08) 0%, transparent 60%);
  --mesh-2: radial-gradient(ellipse 60% 80% at 85% 75%, rgba(192,132,252,0.06) 0%, transparent 60%);
  --mesh-3: radial-gradient(ellipse 50% 50% at 50% 10%, rgba(52,211,153,0.04) 0%, transparent 50%);
  --dot-color: rgba(123, 164, 247, 0.18);
  --line-color: rgba(123, 164, 247, 0.04);
}

[data-theme="light"] {
  --bg: #f0eff5;
  --bg-glass: rgba(255, 255, 255, 0.5);
  --bg-glass-solid: rgba(255, 255, 255, 0.75);
  --bg-glass-hover: rgba(255, 255, 255, 0.65);
  --bg-input: rgba(255, 255, 255, 0.6);
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.15);
  --border-accent: rgba(50, 90, 200, 0.25);
  --accent: #3b6de8;
  --accent-2: #8b5cf6;
  --accent-3: #059669;
  --accent-soft: rgba(59, 109, 232, 0.1);
  --accent-glow: rgba(59, 109, 232, 0.05);
  --text: #111019;
  --text-2: #555068;
  --text-3: #8e8aa0;
  --text-4: #c5c2d0;
  --red: #e04040;
  --green: #16a34a;
  --glass-blur: 24px;
  --glass-shadow: 0 4px 24px rgba(0,0,0,0.08);
  --mesh-1: radial-gradient(ellipse 80% 60% at 10% 20%, rgba(59,109,232,0.07) 0%, transparent 60%);
  --mesh-2: radial-gradient(ellipse 60% 80% at 85% 75%, rgba(139,92,246,0.05) 0%, transparent 60%);
  --mesh-3: radial-gradient(ellipse 50% 50% at 50% 10%, rgba(5,150,105,0.04) 0%, transparent 50%);
  --dot-color: rgba(59, 109, 232, 0.12);
  --line-color: rgba(59, 109, 232, 0.025);
}

/* ═══════════════════════════════════════
   BASE
   ═══════════════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::selection { background: var(--accent); color: white; }

/* Mesh gradient BG */
.mesh-bg {
  position: fixed; inset: 0; z-index: -3; pointer-events: none;
  background: var(--bg);
}
.mesh-bg::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--mesh-1), var(--mesh-2), var(--mesh-3);
  animation: meshShift 30s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05) translate(10px, -10px); }
  100% { opacity: 1; transform: scale(1) translate(-5px, 5px); }
}

/* Noise grain */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px;
}

#bgCanvas { position: fixed; inset: 0; z-index: -2; pointer-events: none; }

/* Glass mixin via classes */
.glass {
  background: var(--bg-glass);
  backdrop-filter: blur(var(--glass-blur)) saturate(1.3);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.3);
  border: 1px solid var(--border);
  box-shadow: var(--glass-shadow);
}

/* Smooth theme transition */
*, *::before, *::after {
  transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
}

/* ═══════════════════════════════════════
   HEADER
   ═══════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-glass-solid);
  backdrop-filter: blur(30px) saturate(1.4);
  -webkit-backdrop-filter: blur(30px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0 2.5rem;
}

.header-bar { display: flex; align-items: center; justify-content: space-between; height: 60px; }

.logo { display: flex; align-items: center; gap: 0.7rem; }
.logo-mark { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
.logo-mark span { color: var(--accent); }
.logo-divider { width: 1px; height: 16px; background: var(--border-hover); }
.logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; font-weight: 500; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; }

.header-actions { display: flex; align-items: center; gap: 0.6rem; }

.stat-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 500;
  color: var(--text-3); padding: 0.3rem 0.65rem;
  border: 1px solid var(--border); border-radius: 100px;
  background: var(--bg-glass);
  backdrop-filter: blur(10px);
}
.stat-pill strong { color: var(--accent); }

/* Shared button base */
.hdr-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; font-weight: 500;
  letter-spacing: 0.04em; border-radius: 8px; cursor: pointer;
  transition: all 0.15s ease; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 0.35rem;
}

.hdr-btn-ghost {
  color: var(--text-2); background: var(--bg-glass); border: 1px solid var(--border);
  padding: 0.38rem 0.8rem;
  backdrop-filter: blur(10px);
}
.hdr-btn-ghost:hover { color: var(--accent); border-color: var(--border-accent); background: var(--accent-soft); }
.hdr-btn-ghost.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

.hdr-btn-accent {
  color: white; background: var(--accent); border: 1px solid var(--accent);
  padding: 0.38rem 0.8rem;
}
.hdr-btn-accent:hover { filter: brightness(1.15); box-shadow: 0 4px 16px rgba(123,164,247,0.25); }

.hdr-btn-icon {
  width: 30px; height: 30px; padding: 0;
  color: var(--text-2); background: var(--bg-glass); border: 1px solid var(--border);
  backdrop-filter: blur(10px);
}
.hdr-btn-icon svg { width: 15px; height: 15px; }
.hdr-btn-icon:hover { color: var(--accent); border-color: var(--border-accent); }

.btn-discord:hover { color: #5865F2 !important; border-color: rgba(88,101,242,0.4) !important; }

/* Search row */
.search-row { padding: 0.6rem 0 0.5rem; display: flex; gap: 0.6rem; align-items: center; }
.search-field { flex: 1; position: relative; }
.search-field svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-3); width: 14px; height: 14px; }
.search-field input {
  width: 100%; padding: 0.55rem 0.85rem 0.55rem 2.3rem;
  background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 400;
  outline: none; backdrop-filter: blur(10px);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-field input:focus { border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-field input::placeholder { color: var(--text-4); font-weight: 300; }

/* Breadcrumbs */
.breadcrumb-row { padding: 0 0 0.6rem; display: flex; align-items: center; gap: 0.2rem; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 500; }
.bc-item { color: var(--text-3); cursor: pointer; padding: 0.15rem 0.4rem; border-radius: 5px; transition: all 0.12s; }
.bc-item:hover { color: var(--accent); background: var(--accent-soft); }
.bc-item.current { color: var(--text-2); cursor: default; }
.bc-item.current:hover { background: transparent; color: var(--text-2); }
.bc-sep { color: var(--text-4); font-size: 0.5rem; user-select: none; }

/* ═══════════════════════════════════════
   CONTENT
   ═══════════════════════════════════════ */
.content { padding: 1.5rem 2.5rem 5rem; max-width: 1400px; margin: 0 auto; }
#main { transition: opacity 0.2s ease, transform 0.2s ease; }
#main.transitioning { opacity: 0; transform: translateY(6px); }

.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; font-weight: 600;
  color: var(--text-3); letter-spacing: 0.14em; text-transform: uppercase;
  margin-bottom: 0.9rem; padding-left: 2px;
}

/* ═══════════════════════════════════════
   FOLDER CARDS (glass)
   ═══════════════════════════════════════ */
.folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }

.folder {
  background: var(--bg-glass); backdrop-filter: blur(var(--glass-blur)) saturate(1.2);
  border: 1px solid var(--border); border-radius: 14px;
  cursor: pointer; overflow: hidden; position: relative;
  transition: all 0.2s ease;
}

.folder::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(135deg, rgba(123,164,247,0.08) 0%, rgba(192,132,252,0.04) 100%);
  opacity: 0; transition: opacity 0.2s;
}

.folder:hover {
  border-color: var(--border-hover);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.25), 0 0 0 1px var(--border-accent);
}
.folder:hover::before { opacity: 1; }

.folder-preview { width: 100%; height: 85px; display: flex; gap: 2px; overflow: hidden; background: rgba(0,0,0,0.2); position: relative; z-index: 1; }
.folder-preview img { flex: 1; min-width: 0; height: 100%; object-fit: cover; display: block; filter: brightness(0.65) saturate(0.4); transition: filter 0.25s; }
.folder:hover .folder-preview img { filter: brightness(0.8) saturate(0.9); }
.folder-preview-empty { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); }
.folder-preview-empty svg { width: 20px; height: 20px; color: var(--text-4); opacity: 0.4; }

.folder-info { padding: 0.8rem 1rem; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
.folder-info-left { min-width: 0; }
.folder-name { font-weight: 600; font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.folder-count { font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; font-weight: 500; color: var(--text-3); margin-top: 0.15rem; }
.folder-icon { width: 26px; height: 26px; border-radius: 7px; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.folder-icon svg { width: 12px; height: 12px; color: var(--accent); }

/* ═══════════════════════════════════════
   CLIP CARDS (glass)
   ═══════════════════════════════════════ */
.clip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.8rem; }
.clip-wrapper { position: relative; }

.clip-action-btns { display: none; position: absolute; top: 8px; right: 8px; z-index: 5; gap: 0.3rem; }
.admin-active .clip-action-btns { display: flex; }
.clip-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 600;
  padding: 0.2rem 0.5rem; border-radius: 5px; cursor: pointer;
  letter-spacing: 0.03em; transition: all 0.12s; line-height: 1.4;
  backdrop-filter: blur(8px);
}
.clip-btn-delete { color: var(--red); background: rgba(0,0,0,0.6); border: 1px solid var(--red); }
.clip-btn-delete:hover { background: var(--red); color: white; }
.clip-btn-edit { color: var(--accent); background: rgba(0,0,0,0.6); border: 1px solid var(--accent); }
.clip-btn-edit:hover { background: var(--accent); color: white; }

.clip-card {
  display: block; background: var(--bg-glass);
  backdrop-filter: blur(var(--glass-blur)) saturate(1.2);
  border: 1px solid var(--border); border-radius: 14px;
  overflow: hidden; text-decoration: none; color: inherit;
  transition: all 0.2s ease;
}
.clip-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-3px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 0 1px var(--border-accent);
}

.clip-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: rgba(0,0,0,0.3); overflow: hidden; }
.clip-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.2s; }
.clip-thumb-wrap video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 2; }
.clip-thumb-wrap.previewing video { display: block; }
.clip-thumb-wrap.previewing img { opacity: 0; }
.clip-thumb-wrap.previewing .clip-play-indicator { display: none; }

.clip-play-indicator {
  position: absolute; bottom: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.15); z-index: 3;
}
.clip-play-indicator svg { width: 10px; height: 10px; color: white; margin-left: 1px; }

.clip-copy-btn {
  position: absolute; bottom: 8px; left: 8px; z-index: 4;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0; transition: all 0.15s;
}
.clip-copy-btn svg { width: 12px; height: 12px; color: white; }
.clip-thumb-wrap:hover .clip-copy-btn { opacity: 1; }
.clip-copy-btn:hover { background: var(--accent); border-color: var(--accent); }
.clip-copy-btn.copied { background: var(--green); border-color: var(--green); }

.clip-thumb-fallback { width: 100%; aspect-ratio: 16/9; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
.clip-thumb-fallback svg { width: 26px; height: 26px; color: var(--text-4); opacity: 0.4; }

.clip-body { padding: 0.85rem 1rem; }
.clip-title { font-weight: 600; font-size: 0.84rem; color: var(--text); margin-bottom: 0.35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clip-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.35rem; }
.clip-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 500; color: var(--accent); background: var(--accent-soft); padding: 0.12rem 0.4rem; border-radius: 5px; }
.clip-date { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text-4); }
.clip-path { font-family: 'JetBrains Mono', monospace; font-size: 0.53rem; color: var(--text-3); margin-top: 0.1rem; }

/* ═══════════════════════════════════════
   ADMIN PANEL (glass)
   ═══════════════════════════════════════ */
.admin-panel {
  display: none; background: var(--bg-glass); backdrop-filter: blur(var(--glass-blur)) saturate(1.2);
  border: 1px solid var(--border); border-radius: 16px;
  padding: 1.4rem; margin-bottom: 1.5rem;
  animation: panelIn 0.25s ease;
}
.admin-panel.open { display: block; }
@keyframes panelIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

.admin-heading { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; margin-bottom: 0.65rem; }
.form-grid.full { grid-template-columns: 1fr; }
.field label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 600; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.25rem; }
.field input, .field textarea {
  width: 100%; padding: 0.5rem 0.7rem; background: var(--bg-input);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-family: 'Sora', sans-serif; font-size: 0.8rem; outline: none;
  backdrop-filter: blur(6px); transition: border-color 0.12s;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field input::placeholder, .field textarea::placeholder { color: var(--text-4); font-weight: 300; }

.form-actions { display: flex; gap: 0.45rem; margin-top: 0.7rem; flex-wrap: wrap; }
.btn-primary {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.04em; color: white; background: var(--accent); border: none;
  padding: 0.5rem 1.2rem; border-radius: 8px; cursor: pointer; transition: all 0.12s;
}
.btn-primary:hover { filter: brightness(1.12); box-shadow: 0 4px 20px var(--accent-glow); }
.btn-ghost {
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 500;
  color: var(--text-3); background: var(--bg-glass); border: 1px solid var(--border);
  padding: 0.45rem 0.9rem; border-radius: 8px; cursor: pointer; transition: all 0.12s;
  backdrop-filter: blur(6px);
}
.btn-ghost:hover { color: var(--text-2); border-color: var(--border-hover); }

/* ═══════════════════════════════════════
   MODAL (glass)
   ═══════════════════════════════════════ */
.modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box { background: var(--bg-glass-solid); backdrop-filter: blur(30px) saturate(1.3); border: 1px solid var(--border-hover); border-radius: 18px; padding: 1.6rem; width: 90%; max-width: 540px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.25s ease; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
@keyframes modalIn { from { opacity: 0; transform: translateY(14px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 1.1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
.modal-actions { display: flex; gap: 0.45rem; margin-top: 1rem; justify-content: flex-end; }
.btn-cancel { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 500; color: var(--text-3); background: transparent; border: 1px solid var(--border); padding: 0.45rem 0.9rem; border-radius: 8px; cursor: pointer; transition: all 0.12s; }
.btn-cancel:hover { color: var(--text-2); border-color: var(--border-hover); }

/* ═══════════════════════════════════════
   TAG BAR
   ═══════════════════════════════════════ */
.tag-bar { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0.5rem 0 0.3rem; }
.tag-bar-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 500;
  color: var(--text-3); background: var(--bg-glass); backdrop-filter: blur(8px);
  border: 1px solid var(--border); padding: 0.22rem 0.5rem; border-radius: 100px;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.tag-bar-pill:hover { color: var(--accent); border-color: var(--border-accent); background: var(--accent-soft); }
.tag-bar-pill.active { color: white; background: var(--accent); border-color: var(--accent); }
.tag-bar-clear { font-family: 'JetBrains Mono', monospace; font-size: 0.53rem; font-weight: 500; color: var(--text-4); background: none; border: none; cursor: pointer; padding: 0.22rem 0.35rem; transition: color 0.12s; }
.tag-bar-clear:hover { color: var(--red); }

.last-updated { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text-4); padding-left: 2px; margin-bottom: 1rem; }

/* ═══════════════════════════════════════
   MISC
   ═══════════════════════════════════════ */
.empty { text-align: center; padding: 5rem 2rem; }
.empty svg { width: 36px; height: 36px; color: var(--text-4); opacity: 0.35; margin-bottom: 0.8rem; }
.empty-title { font-weight: 600; font-size: 0.95rem; color: var(--text-2); margin-bottom: 0.3rem; }
.empty-sub { font-size: 0.82rem; color: var(--text-3); font-weight: 300; }

.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--bg-glass-solid); backdrop-filter: blur(16px);
  border: 1px solid var(--border-hover); color: var(--text-2);
  padding: 0.6rem 1rem; border-radius: 10px;
  font-size: 0.78rem; font-weight: 500; z-index: 999;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  animation: toastIn 0.25s ease, toastOut 0.25s ease 2.5s forwards;
}
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; pointer-events:none; } }

.folder, .clip-wrapper { animation: itemIn 0.35s ease both; }
@keyframes itemIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* Back to top */
.back-top {
  position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 90;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg-glass); backdrop-filter: blur(12px);
  border: 1px solid var(--border); color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0; pointer-events: none;
  transition: all 0.2s ease;
}
.back-top svg { width: 16px; height: 16px; }
.back-top.visible { opacity: 1; pointer-events: auto; }
.back-top:hover { color: var(--accent); border-color: var(--border-accent); transform: translateY(-2px); }

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 768px) {
  .header { padding: 0 1rem; }
  .content { padding: 1rem 1rem 4rem; }
  .folder-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .clip-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
  .form-grid { grid-template-columns: 1fr; }
  .logo-sub, .btn-coffee, .stat-pill { display: none; }
  .folder-preview { height: 60px; }
  .modal-box { width: 95%; padding: 1.2rem; }
  .hdr-btn-ghost span { display: none; }
}
</style>

<div class="mesh-bg"></div>
<canvas id="bgCanvas"></canvas>

<header class="header">
  <div class="header-bar">
    <div class="logo">
      <span class="logo-mark">Clip<span>Vault</span></span>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const SAMPLE_DATA = [{ id:'c1', anime:'Attack on Titan', sceneType:'Action', character:'Eren', name:'Eren punches titan', thumbnail:'', discordLink:'#', tags:['punch','rage'], addedAt:'2026-03-20' }];

let clips = [], path = [], adminOpen = false, searchQ = '', activeTag = '';

async function loadSharedData() {
  try {
    const res = await fetch('./data.json?v=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw 0;
    const data = await res.json();
    if (!Array.isArray(data)) throw 0;
    clips = data;
  } catch { clips = [...SAMPLE_DATA]; }
  render();
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function groupBy(arr, key) { const m = {}; arr.forEach(c => { const k = c[key]||'Unknown'; m[k]=(m[k]||0)+1; }); return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])); }
function getPreviewThumbs(f, n) { return f.map(c=>c.thumbnail).filter(t=>t&&t.startsWith('http')).slice(0,n); }

const icons = { folder:'<svg><use href="#ico-folder"/></svg>', film:'<svg><use href="#ico-film"/></svg>', user:'<svg><use href="#ico-user"/></svg>', tag:'<svg><use href="#ico-tag"/></svg>', play:'<svg><use href="#ico-play"/></svg>', empty:'<svg><use href="#ico-empty"/></svg>' };
function folderIcon(d) { return d===0?icons.film:d===1?icons.tag:icons.user; }

function updateStats() {
  const ac = new Set(clips.map(c=>c.anime)).size;
  document.getElementById('stats').innerHTML = `<strong>${clips.length}</strong> clips &middot; <strong>${ac}</strong> series`;
}

function updateBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  let h = `<span class="bc-item ${path.length===0?'current':''}" onclick="nav(0)">All</span>`;
  path.forEach((p,i)=>{ h+=`<span class="bc-sep">/</span><span class="bc-item ${i===path.length-1?'current':''}" onclick="nav(${i+1})">${esc(p)}</span>`; });
  el.innerHTML = h;
}

function transitionTo(fn) { const m=document.getElementById('main'); m.classList.add('transitioning'); setTimeout(()=>{fn();m.classList.remove('transitioning');},180); }
function nav(d) { path=path.slice(0,d); searchQ=''; activeTag=''; document.getElementById('search').value=''; transitionTo(render); }
function openDir(n) { path.push(n); transitionTo(render); }

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render() {
  updateStats(); updateBreadcrumb();
  const main = document.getElementById('main'), d = path.length;
  if (searchQ) { renderSearch(main); return; }
  if (activeTag) {
    const r = clips.filter(c => Array.isArray(c.tags) && c.tags.some(t=>t.toLowerCase()===activeTag.toLowerCase()));
    main.innerHTML = tagBarHtml() + sectionLabel(`Tag: ${activeTag}`, r.length) + (r.length ? `<div class="clip-grid">${r.map(c=>clipCardHtml(c,true)).join('')}</div>` : emptyHtml('No clips','Try another tag.'));
    applyStagger(); document.body.classList.toggle('admin-active',adminOpen); return;
  }
  if (d===0) { const it=groupBy(clips,'anime'); if(!it.length){main.innerHTML=emptyHtml('No clips yet','Open Manage to add your first clip.');return;} main.innerHTML=lastUpdatedHtml()+tagBarHtml()+sectionLabel('Series',it.length)+folderGridHtml(it,0,()=>true); }
  else if (d===1) { const it=groupBy(clips.filter(c=>c.anime===path[0]),'sceneType'); main.innerHTML=sectionLabel('Scene Types',it.length)+folderGridHtml(it,1,c=>c.anime===path[0]); }
  else if (d===2) { const it=groupBy(clips.filter(c=>c.anime===path[0]&&c.sceneType===path[1]),'character'); main.innerHTML=sectionLabel('Characters',it.length)+folderGridHtml(it,2,c=>c.anime===path[0]&&c.sceneType===path[1]); }
  else if (d===3) { const l=clips.filter(c=>c.anime===path[0]&&c.sceneType===path[1]&&c.character===path[2]); main.innerHTML=sectionLabel('Clips',l.length)+clipGridHtml(l); }
  applyStagger(); document.body.classList.toggle('admin-active',adminOpen);
}

function lastUpdatedHtml() { if(!clips.length)return''; const d=clips.map(c=>c.addedAt).filter(Boolean).sort(); const l=d[d.length-1]; return l?`<div class="last-updated">Last updated: ${esc(l)}</div>`:''; }

function tagBarHtml() {
  const m={}; clips.forEach(c=>{if(Array.isArray(c.tags))c.tags.forEach(t=>{const k=t.trim();if(k)m[k]=(m[k]||0)+1;});}); const s=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,20); if(!s.length)return'';
  let h='<div class="tag-bar">'; s.forEach(([t])=>{const a=activeTag&&activeTag.toLowerCase()===t.toLowerCase(); h+=`<span class="tag-bar-pill${a?' active':''}" onclick="toggleTag('${t.replace(/'/g,"\\'")}')">${esc(t)}</span>`;}); if(activeTag)h+=`<button class="tag-bar-clear" onclick="clearTag()">CLEAR</button>`; return h+'</div>';
}

function toggleTag(t) { activeTag=(activeTag&&activeTag.toLowerCase()===t.toLowerCase())?'':t; path=[]; searchQ=''; document.getElementById('search').value=''; transitionTo(render); }
function clearTag() { activeTag=''; transitionTo(render); }
function sectionLabel(l,c) { return `<div class="section-label">${l} &middot; ${c}</div>`; }

function folderGridHtml(items, depth, pf) {
  const key = depth===0?'anime':depth===1?'sceneType':'character';
  return `<div class="folder-grid">${items.map(([name,count])=>{
    const fc=clips.filter(c=>pf(c)&&c[key]===name), th=getPreviewThumbs(fc,3);
    const prev=th.length?th.map(t=>`<img src="${esc(t)}" alt="" onerror="this.style.display='none'">`).join(''):`<div class="folder-preview-empty">${icons.film}</div>`;
    return `<div class="folder" onclick="openDir('${String(name).replace(/'/g,"\\'")}')"><div class="folder-preview">${prev}</div><div class="folder-info"><div class="folder-info-left"><div class="folder-name">${esc(name)}</div><div class="folder-count">${count} clip${count!==1?'s':''}</div></div><div class="folder-icon">${folderIcon(depth)}</div></div></div>`;
  }).join('')}</div>`;
}

function clipGridHtml(l) { return `<div class="clip-grid">${l.map(c=>clipCardHtml(c)).join('')}</div>`; }

function isVideoUrl(u) { return u && (/\.(mp4|webm|mov)(\?|$)/i.test(u) || u.includes('sakugabooru.com/data/')); }

function clipCardHtml(c, showPath) {
  const tags=Array.isArray(c.tags)?c.tags:[], link=c.discordLink||'#', hv=isVideoUrl(link);
  return `<div class="clip-wrapper"><div class="clip-action-btns"><button class="clip-btn clip-btn-edit" onclick="event.stopPropagation();openEditModal('${c.id}')">EDIT</button><button class="clip-btn clip-btn-delete" onclick="event.stopPropagation();deleteClip('${c.id}')">DEL</button></div><a class="clip-card" href="${esc(link)}" target="_blank" rel="noopener"><div class="clip-thumb-wrap" ${hv?`onmouseenter="previewIn(this,'${esc(link)}')" onmouseleave="previewOut(this)"`:''}>
  ${c.thumbnail?`<img src="${esc(c.thumbnail)}" alt="${esc(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="clip-thumb-fallback" style="display:none;position:absolute;inset:0">${icons.film}</div>`:`<div class="clip-thumb-fallback">${icons.film}</div>`}
  ${hv?'<video muted loop playsinline preload="none"></video>':''}
  <div class="clip-play-indicator">${icons.play}</div>
  <button class="clip-copy-btn" onclick="event.preventDefault();event.stopPropagation();copyUrl(this,'${esc(link)}')" title="Copy URL"><svg><use href="#ico-copy"/></svg></button>
  </div><div class="clip-body"><div class="clip-title">${esc(c.name||'')}</div><div class="clip-tags">${tags.map(t=>`<span class="clip-tag">${esc(t)}</span>`).join('')}</div>${showPath?`<div class="clip-path">${esc(c.anime||'')} / ${esc(c.sceneType||'')} / ${esc(c.character||'')}</div>`:''}<div class="clip-date">${esc(c.addedAt||'')}</div></div></a></div>`;
}

function renderSearch(main) {
  const q=searchQ.toLowerCase(), words=q.split(' ').filter(w=>w), r=clips.filter(c=>{
    const name=(c.name||'').toLowerCase(), anime=(c.anime||'').toLowerCase(), character=(c.character||'').toLowerCase(), sceneType=(c.sceneType||'').toLowerCase(), tags=Array.isArray(c.tags)?c.tags.map(t=>(t||'').toLowerCase()):'';
    return words.every(word=>name.includes(word)||anime.includes(word)||character.includes(word)||sceneType.includes(word)||(Array.isArray(tags)&&tags.some(t=>t.includes(word))));
  });
  if(!r.length){main.innerHTML=emptyHtml('No matches',`Nothing for "${esc(searchQ)}".`);return;}
  main.innerHTML=sectionLabel('Results',r.length)+`<div class="clip-grid">${r.map(c=>clipCardHtml(c,true)).join('')}</div>`; applyStagger();
}

function emptyHtml(t,s) { return `<div class="empty">${icons.empty}<div class="empty-title">${t}</div><div class="empty-sub">${s}</div></div>`; }
function applyStagger() { document.querySelectorAll('.folder,.clip-wrapper').forEach((el,i)=>{el.style.animationDelay=(i*0.04)+'s';}); }

// ═══════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════
function toggleAdmin() { adminOpen=!adminOpen; document.getElementById('adminPanel').classList.toggle('open',adminOpen); document.getElementById('manageBtn').classList.toggle('active',adminOpen); document.body.classList.toggle('admin-active',adminOpen); }

document.getElementById('quickMode').addEventListener('change', function() { document.getElementById('quickModeHint').style.display=this.checked?'block':'none'; });

function addClip() {
  const a=document.getElementById('inp-anime').value.trim(),s=document.getElementById('inp-scene').value.trim(),ch=document.getElementById('inp-character').value.trim(),n=document.getElementById('inp-name').value.trim(),th=document.getElementById('inp-thumb').value.trim(),l=document.getElementById('inp-link').value.trim(),tg=document.getElementById('inp-tags').value.trim();
  if(!a||!s||!ch||!n||!l){toast('Fill required fields','error');return;}
  clips.push({id:'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),anime:a,sceneType:s,character:ch,name:n,thumbnail:th,discordLink:l,tags:tg?tg.split(',').map(t=>t.trim()).filter(Boolean):[],addedAt:new Date().toISOString().split('T')[0]});
  const q=document.getElementById('quickMode').checked;
  if(q){['inp-name','inp-thumb','inp-link'].forEach(id=>document.getElementById(id).value='');document.getElementById('inp-name').focus();}
  else{['inp-anime','inp-scene','inp-character','inp-name','inp-thumb','inp-link','inp-tags'].forEach(id=>document.getElementById(id).value='');}
  toast('Clip added — export to save','success'); render();
}

function toggleBulkPaste(){const el=document.getElementById('bulkPasteArea');el.style.display=el.style.display==='none'?'block':'none';}

function bulkAdd(){
  const raw=document.getElementById('bulkJson').value.trim();if(!raw){toast('Paste JSON first','error');return;}
  try{const arr=JSON.parse(raw);if(!Array.isArray(arr)){toast('Must be array','error');return;}let n=0;arr.forEach(c=>{if(!c.name&&!c.discordLink)return;clips.push({id:'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),anime:c.anime||'Unknown',sceneType:c.sceneType||'Unknown',character:c.character||'Unknown',name:c.name||'Untitled',thumbnail:c.thumbnail||'',discordLink:c.discordLink||'',tags:Array.isArray(c.tags)?c.tags:[],addedAt:c.addedAt||new Date().toISOString().split('T')[0]});n++;});document.getElementById('bulkJson').value='';toggleBulkPaste();toast(`Added ${n} clips`,'success');render();}catch{toast('Invalid JSON','error');}
}

function deleteClip(id){if(!confirm('Delete?'))return;clips=clips.filter(c=>c.id!==id);toast('Removed — export to save','success');render();}

function openEditModal(id){
  const c=clips.find(x=>x.id===id);if(!c)return;const tg=Array.isArray(c.tags)?c.tags.join(', '):'';
  document.getElementById('editModal').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeEditModal()"><div class="modal-box"><div class="modal-title">Edit Clip</div><div class="form-grid"><div class="field"><label>Anime</label><input id="edit-anime" value="${esc(c.anime||'')}"></div><div class="field"><label>Scene Type</label><input id="edit-scene" value="${esc(c.sceneType||'')}"></div></div><div class="form-grid"><div class="field"><label>Character</label><input id="edit-character" value="${esc(c.character||'')}"></div><div class="field"><label>Name</label><input id="edit-name" value="${esc(c.name||'')}"></div></div><div class="form-grid"><div class="field"><label>Thumbnail</label><input id="edit-thumb" value="${esc(c.thumbnail||'')}"></div><div class="field"><label>Link</label><input id="edit-link" value="${esc(c.discordLink||'')}"></div></div><div class="form-grid full"><div class="field"><label>Tags</label><input id="edit-tags" value="${esc(tg)}"></div></div><div class="modal-actions"><button class="btn-cancel" onclick="closeEditModal()">CANCEL</button><button class="btn-primary" onclick="saveEdit('${id}')">SAVE</button></div></div></div>`;
}
function closeEditModal(){document.getElementById('editModal').innerHTML='';}
function saveEdit(id){
  const c=clips.find(x=>x.id===id);if(!c)return;
  const a=document.getElementById('edit-anime').value.trim(),s=document.getElementById('edit-scene').value.trim(),ch=document.getElementById('edit-character').value.trim(),n=document.getElementById('edit-name').value.trim(),th=document.getElementById('edit-thumb').value.trim(),l=document.getElementById('edit-link').value.trim(),tg=document.getElementById('edit-tags').value.trim();
  if(!a||!s||!ch||!n||!l){toast('Fill required fields','error');return;}
  c.anime=a;c.sceneType=s;c.character=ch;c.name=n;c.thumbnail=th;c.discordLink=l;c.tags=tg?tg.split(',').map(t=>t.trim()).filter(Boolean):[];
  closeEditModal();toast('Updated — export to save','success');render();
}

function exportData(){const b=new Blob([JSON.stringify(clips,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='data.json';a.click();URL.revokeObjectURL(a.href);toast('Exported','success');}
function importData(){document.getElementById('importFile').click();}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){clips=d;path=[];searchQ='';document.getElementById('search').value='';toast(`Imported ${clips.length} clips`,'success');render();}else toast('Bad format','error');}catch{toast('Invalid JSON','error');}};r.readAsText(f);e.target.value='';}
function handleSearch(v){searchQ=v.trim();activeTag='';render();}
function randomClip(){const w=clips.filter(c=>c.discordLink&&c.discordLink!=='#');if(!w.length){toast('No clips','error');return;}const c=w[Math.floor(Math.random()*w.length)];window.open(c.discordLink,'_blank');toast(`Random: ${c.name}`,'success');}

function toast(msg,type){const old=document.querySelector('.toast');if(old)old.remove();const t=document.createElement('div');t.className='toast '+(type||'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

// ═══════════════════════════════════════
// VIDEO PREVIEW + COPY
// ═══════════════════════════════════════
let previewTimeout;
function previewIn(w,u){clearTimeout(previewTimeout);const v=w.querySelector('video');if(!v)return;previewTimeout=setTimeout(()=>{if(!v.src||v.src!==u)v.src=u;v.currentTime=0;v.play().catch(()=>{});w.classList.add('previewing');},300);}
function previewOut(w){clearTimeout(previewTimeout);const v=w.querySelector('video');if(!v)return;w.classList.remove('previewing');v.pause();}
function copyUrl(btn,u){navigator.clipboard.writeText(u).then(()=>{btn.innerHTML='<svg><use href="#ico-check"/></svg>';btn.classList.add('copied');toast('Copied','success');setTimeout(()=>{btn.innerHTML='<svg><use href="#ico-copy"/></svg>';btn.classList.remove('copied');},1500);}).catch(()=>toast('Failed','error'));}

// ═══════════════════════════════════════
// PARTICLE CANVAS
// ═══════════════════════════════════════
const canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d');
let particles=[],mouse={x:-999,y:-999};

function resizeCanvas(){canvas.width=innerWidth;canvas.height=innerHeight;}
addEventListener('resize',resizeCanvas); resizeCanvas();
document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
document.addEventListener('mouseleave',()=>{mouse.x=-999;mouse.y=-999;});

function createParticles(){
  particles=[];const n=Math.min(Math.floor((canvas.width*canvas.height)/16000),80);
  for(let i=0;i<n;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.25,r:Math.random()*1.5+0.7});
}
createParticles(); addEventListener('resize',createParticles);

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const s=getComputedStyle(document.documentElement);
  const dc=s.getPropertyValue('--dot-color').trim(),lc=s.getPropertyValue('--line-color').trim();
  for(let i=0;i<particles.length;i++){
    const p=particles[i],dx=p.x-mouse.x,dy=p.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<100&&d>0){const f=(100-d)/100*0.5;p.vx+=dx/d*f;p.vy+=dy/d*f;}
    p.vx*=0.988;p.vy*=0.988;p.x+=p.vx;p.y+=p.vy;
    if(p.x<-10)p.x=canvas.width+10;if(p.x>canvas.width+10)p.x=-10;
    if(p.y<-10)p.y=canvas.height+10;if(p.y>canvas.height+10)p.y=-10;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=dc;ctx.fill();
    for(let j=i+1;j<particles.length;j++){const q=particles[j],cx=p.x-q.x,cy=p.y-q.y,cd=Math.sqrt(cx*cx+cy*cy);
      if(cd<120){const a=(1-cd/120)*0.05;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle=lc.replace(/[\d.]+\)$/,a+')');ctx.lineWidth=0.6;ctx.stroke();}
    }
  }
  requestAnimationFrame(draw);
}
draw();

function toggleTheme(){const c=document.documentElement.getAttribute('data-theme')||'dark';applyTheme(c==='dark'?'light':'dark');}
