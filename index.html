<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon-32.png" type="image/png">
<title>Clip Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0c0c0e;
    --bg-raised: #131316;
    --bg-surface: #19191e;
    --bg-surface-hover: #1f1f26;
    --bg-overlay: rgba(12, 12, 14, 0.92);
    --border-subtle: rgba(255,255,255,0.06);
    --border-medium: rgba(255,255,255,0.1);
    --border-active: rgba(210, 170, 100, 0.4);
    --accent: #d4a853;
    --accent-dim: rgba(212, 168, 83, 0.15);
    --accent-glow: rgba(212, 168, 83, 0.08);
    --text-100: #f0ece4;
    --text-200: #b8b4ac;
    --text-300: #7a776f;
    --text-400: #4a4842;
    --red: #c0564b;
    --green: #5cb07a;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-base); color: var(--text-100); font-family: 'Outfit', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--accent); color: var(--bg-base); }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 128px 128px; }

  .header { position: sticky; top: 0; z-index: 100; background: var(--bg-overlay); backdrop-filter: blur(24px) saturate(1.2); border-bottom: 1px solid var(--border-subtle); padding: 0 2.5rem; }
  .header-bar { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { display: flex; align-items: baseline; gap: 0.6rem; }
  .logo-mark { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: var(--text-100); line-height: 1; }
  .logo-divider { width: 1px; height: 18px; background: var(--border-medium); align-self: center; }
  .logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 500; color: var(--text-300); letter-spacing: 0.12em; text-transform: uppercase; }
  .header-actions { display: flex; align-items: center; gap: 0.75rem; }
  .stat-pill { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 500; color: var(--text-300); letter-spacing: 0.04em; padding: 0.35rem 0.7rem; border: 1px solid var(--border-subtle); border-radius: 100px; }
  .stat-pill strong { color: var(--accent); font-weight: 600; }

  .btn-manage { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.06em; color: var(--text-200); background: var(--bg-surface); border: 1px solid var(--border-subtle); padding: 0.4rem 0.9rem; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; }
  .btn-manage:hover { color: var(--accent); border-color: var(--border-active); background: var(--accent-glow); }
  .btn-manage.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  .btn-coffee { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.06em; color: var(--bg-base); background: var(--accent); border: 1px solid var(--accent); padding: 0.4rem 0.9rem; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .btn-coffee:hover { filter: brightness(1.15); box-shadow: 0 2px 12px rgba(212, 168, 83, 0.25); }

  .btn-discord { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-200); transition: all 0.15s; text-decoration: none; }
  .btn-discord svg { width: 18px; height: 18px; }
  .btn-discord:hover { color: #5865F2; border-color: rgba(88, 101, 242, 0.4); background: rgba(88, 101, 242, 0.08); box-shadow: 0 2px 12px rgba(88, 101, 242, 0.15); }

  .search-row { padding: 0.75rem 0 0.6rem; display: flex; gap: 0.75rem; align-items: center; }
  .search-field { flex: 1; position: relative; }
  .search-field svg { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-400); width: 15px; height: 15px; }
  .search-field input { width: 100%; padding: 0.6rem 0.9rem 0.6rem 2.5rem; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); color: var(--text-100); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 400; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .search-field input:focus { border-color: var(--border-active); box-shadow: 0 0 0 3px var(--accent-glow); }
  .search-field input::placeholder { color: var(--text-400); font-weight: 300; }

  .breadcrumb-row { padding: 0 0 0.75rem; display: flex; align-items: center; gap: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 500; }
  .bc-item { color: var(--text-400); cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px; transition: all 0.12s; letter-spacing: 0.02em; }
  .bc-item:hover { color: var(--accent); background: var(--accent-glow); }
  .bc-item.current { color: var(--text-200); cursor: default; }
  .bc-item.current:hover { background: transparent; color: var(--text-200); }
  .bc-sep { color: var(--text-400); font-size: 0.55rem; user-select: none; }

  .content { padding: 1.75rem 2.5rem 5rem; max-width: 1400px; margin: 0 auto; }
  #main { transition: opacity 0.2s ease, transform 0.2s ease; }
  #main.transitioning { opacity: 0; transform: translateY(6px); }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; font-weight: 600; color: var(--text-400); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 1rem; padding-left: 2px; }

  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.7rem; margin-bottom: 2.5rem; }
  .folder { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); cursor: pointer; transition: all 0.18s ease; position: relative; overflow: hidden; }
  .folder::after { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--accent); opacity: 0; transition: opacity 0.18s; }
  .folder:hover { background: var(--bg-surface-hover); border-color: var(--border-medium); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
  .folder:hover::after { opacity: 1; }

  .folder-preview { width: 100%; height: 80px; display: flex; gap: 2px; overflow: hidden; background: var(--bg-surface); }
  .folder-preview img { flex: 1; min-width: 0; height: 100%; object-fit: cover; display: block; filter: brightness(0.7) saturate(0.8); transition: filter 0.2s; }
  .folder:hover .folder-preview img { filter: brightness(0.85) saturate(1); }
  .folder-preview-empty { flex: 1; height: 100%; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; }
  .folder-preview-empty svg { width: 20px; height: 20px; color: var(--text-400); opacity: 0.3; }

  .folder-info { padding: 0.85rem 1rem; display: flex; align-items: center; justify-content: space-between; }
  .folder-info-left { min-width: 0; }
  .folder-icon { width: 24px; height: 24px; border-radius: 5px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .folder-icon svg { width: 12px; height: 12px; color: var(--accent); }
  .folder-name { font-weight: 600; font-size: 0.88rem; color: var(--text-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .folder-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; font-weight: 500; color: var(--text-400); letter-spacing: 0.03em; margin-top: 0.1rem; }

  .clip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.75rem; }
  .clip-wrapper { position: relative; }
  .clip-action-btns { display: none; position: absolute; top: 8px; right: 8px; z-index: 5; gap: 0.3rem; }
  .admin-active .clip-action-btns { display: flex; }
  .clip-btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; font-weight: 600; background: var(--bg-base); padding: 0.22rem 0.5rem; border-radius: 4px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.12s; line-height: 1.4; }
  .clip-btn-delete { color: var(--red); border: 1px solid var(--red); }
  .clip-btn-delete:hover { background: var(--red); color: white; }
  .clip-btn-edit { color: var(--accent); border: 1px solid var(--accent); }
  .clip-btn-edit:hover { background: var(--accent); color: var(--bg-base); }

  .clip-card { display: block; background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; text-decoration: none; color: inherit; transition: all 0.18s ease; }
  .clip-card:hover { border-color: var(--border-medium); transform: translateY(-2px); box-shadow: 0 10px 36px rgba(0,0,0,0.3); }
  .clip-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: var(--bg-surface); overflow: hidden; }
  .clip-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .clip-play-indicator { position: absolute; bottom: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.12); }
  .clip-play-indicator svg { width: 10px; height: 10px; color: white; margin-left: 1px; }
  .clip-thumb-fallback { width: 100%; aspect-ratio: 16/9; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; }
  .clip-thumb-fallback svg { width: 28px; height: 28px; color: var(--text-400); opacity: 0.5; }
  .clip-body { padding: 0.85rem 1rem; }
  .clip-title { font-weight: 600; font-size: 0.85rem; color: var(--text-100); margin-bottom: 0.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clip-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.45rem; }
  .clip-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; font-weight: 500; color: var(--accent); background: var(--accent-dim); padding: 0.15rem 0.45rem; border-radius: 4px; letter-spacing: 0.03em; }
  .clip-date { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--text-400); }
  .clip-path { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: var(--text-400); margin-top: 0.15rem; opacity: 0.7; }

  .admin-panel { display: none; background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 2rem; animation: panelReveal 0.2s ease; }
  .admin-panel.open { display: block; }
  @keyframes panelReveal { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .admin-heading { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 0.06em; color: var(--text-200); margin-bottom: 1.1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border-subtle); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 0.7rem; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; font-weight: 600; color: var(--text-400); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .field input { width: 100%; padding: 0.55rem 0.75rem; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); color: var(--text-100); font-family: 'Outfit', sans-serif; font-size: 0.82rem; outline: none; transition: border-color 0.12s; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text-400); font-weight: 300; }
  .form-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .btn-primary { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; color: var(--bg-base); background: var(--accent); border: none; padding: 0.55rem 1.3rem; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s; }
  .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 16px rgba(212, 168, 83, 0.2); }
  .btn-ghost { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em; color: var(--text-300); background: transparent; border: 1px solid var(--border-subtle); padding: 0.5rem 1rem; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s; }
  .btn-ghost:hover { color: var(--text-200); border-color: var(--border-medium); }

  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; animation: modalFadeIn 0.2s ease; }
  @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box { background: var(--bg-raised); border: 1px solid var(--border-medium); border-radius: var(--radius-lg); padding: 1.75rem; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: modalSlideIn 0.25s ease; box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
  @keyframes modalSlideIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.06em; color: var(--text-100); margin-bottom: 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border-subtle); }
  .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
  .btn-cancel { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 500; color: var(--text-300); background: transparent; border: 1px solid var(--border-subtle); padding: 0.5rem 1rem; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s; }
  .btn-cancel:hover { color: var(--text-200); border-color: var(--border-medium); }

  .empty { text-align: center; padding: 5rem 2rem; }
  .empty svg { width: 40px; height: 40px; color: var(--text-400); opacity: 0.4; margin-bottom: 1rem; }
  .empty-title { font-weight: 600; font-size: 1rem; color: var(--text-200); margin-bottom: 0.35rem; }
  .empty-sub { font-size: 0.85rem; color: var(--text-400); font-weight: 300; }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg-raised); border: 1px solid var(--border-medium); color: var(--text-200); padding: 0.65rem 1.1rem; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 500; z-index: 999; box-shadow: 0 10px 36px rgba(0,0,0,0.45); animation: toastIn 0.25s ease, toastOut 0.25s ease 2.5s forwards; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }

  .folder, .clip-wrapper { animation: itemIn 0.3s ease both; }
  @keyframes itemIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  #bgSlideshow { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .bg-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; filter: blur(30px) saturate(0.3) brightness(0.18); transition: opacity 4s ease-in-out; pointer-events: none; }
  .bg-img.active { opacity: 1; }

  /* ── RANDOM BUTTON ── */
  .btn-random {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text-200);
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    padding: 0.52rem 0.9rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-random:hover { color: var(--accent); border-color: var(--border-active); background: var(--accent-glow); }

  /* ── TAG FILTER BAR ── */
  .tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    padding: 0.6rem 0 0.2rem;
  }

  .tag-bar-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--text-300);
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    padding: 0.25rem 0.55rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .tag-bar-pill:hover {
    color: var(--accent);
    border-color: var(--border-active);
    background: var(--accent-glow);
  }

  .tag-bar-pill.active {
    color: var(--bg-base);
    background: var(--accent);
    border-color: var(--accent);
  }

  .tag-bar-pill.active:hover {
    filter: brightness(1.1);
  }

  .tag-bar-clear {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem; font-weight: 500;
    color: var(--text-400);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.25rem 0.4rem;
    transition: color 0.12s;
  }

  .tag-bar-clear:hover { color: var(--red); }

  /* ── LAST UPDATED ── */
  .last-updated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    color: var(--text-400);
    letter-spacing: 0.03em;
    padding-left: 2px;
    margin-bottom: 1.25rem;
  }

  @media (max-width: 768px) {
    .header { padding: 0 1.25rem; }
    .content { padding: 1.25rem 1.25rem 4rem; }
    .folder-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .clip-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .form-grid { grid-template-columns: 1fr; }
    .logo-sub { display: none; }
    .btn-coffee { display: none; }
    .stat-pill { display: none; }
    .folder-preview { height: 60px; }
    .modal-box { width: 95%; padding: 1.25rem; }
    .btn-random { padding: 0.52rem 0.6rem; font-size: 0.6rem; }
  }
</style>
</head>

  <symbol id="ico-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></symbol>
  <symbol id="ico-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
  <symbol id="ico-discord" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.947 2.418-2.157 2.418z"/></symbol>
</svg>

<div id="bgSlideshow"></div>

<header class="header">
  <div class="header-bar">
    <div class="logo">
      <span class="logo-mark">CLIP VAULT</span>
      <div class="logo-divider"></div>
      <span class="logo-sub">Community Clip Library</span>
    </div>
    <div class="header-actions">
      <span class="stat-pill" id="stats"></span>
      <a href="https://buymeacoffee.com/xayvis" target="_blank" rel="noopener" class="btn-coffee">BUY ME A COFFEE</a>
      <a href="https://discord.gg/6qNtYym7dD" target="_blank" rel="noopener" class="btn-discord" title="Join our Discord"><svg><use href="#ico-discord"/></svg></a>
      <button class="btn-manage" id="manageBtn" onclick="toggleAdmin()">MANAGE</button>
    </div>
  </div>
  <div class="search-row">
    <div class="search-field">
      <svg><use href="#ico-search"/></svg>
      <input type="text" id="search" placeholder="Search by name, anime, character, or tag..." oninput="handleSearch(this.value)">
    </div>
    <button class="btn-random" onclick="randomClip()">RANDOM</button>
  </div>
  <div class="breadcrumb-row" id="breadcrumb"></div>
</header>

<main class="content">
  <div class="admin-panel" id="adminPanel">
    <div class="admin-heading">ADD NEW CLIP</div>
    <div class="form-grid">
      <div class="field"><label>Anime</label><input id="inp-anime" placeholder="e.g. Attack on Titan"></div>
      <div class="field"><label>Scene Type</label><input id="inp-scene" placeholder="e.g. Action, Sad, Funny"></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Character</label><input id="inp-character" placeholder="e.g. Eren"></div>
      <div class="field"><label>Clip Name</label><input id="inp-name" placeholder="e.g. Eren punches titan"></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Thumbnail URL</label><input id="inp-thumb" placeholder="https://i.imgur.com/..."></div>
      <div class="field"><label>Discord Message Link</label><input id="inp-link" placeholder="https://discord.com/channels/..."></div>
    </div>
    <div class="form-grid full">
      <div class="field"><label>Tags (comma-separated)</label><input id="inp-tags" placeholder="e.g. punch, rage, epic, season 4"></div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="addClip()">ADD CLIP</button>
      <button class="btn-ghost" onclick="exportData()">EXPORT JSON</button>
      <button class="btn-ghost" onclick="importData()">IMPORT JSON</button>
    </div>
  </div>
  <div id="main"></div>
</main>

<div id="editModal"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
  const SAMPLE_DATA = [
    { id:'c1', anime:'Attack on Titan', sceneType:'Action', character:'Eren', name:'Eren punches titan', thumbnail:'', discordLink:'https://discord.com/channels/example/1/1', tags:['punch','rage'], addedAt:'2026-03-20' },
  ];

  let clips = [];
  let path = [];
  let adminOpen = false;
  let searchQ = '';
  let activeTag = '';

  async function loadSharedData() {
    try {
      const res = await fetch('./data.json?v=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('no data.json');
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('bad format');
      clips = data;
    } catch (e) {
      console.error(e);
      clips = [...SAMPLE_DATA];
    }
    render();
    initBgSlideshow();
  }

  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function groupBy(arr, key) {
    const m = {};
    arr.forEach(c => { const k = c[key] || 'Unknown'; m[k] = (m[k]||0)+1; });
    return Object.entries(m).sort((a,b) => a[0].localeCompare(b[0]));
  }

  function getPreviewThumbs(filtered, n) {
    return filtered.map(c => c.thumbnail).filter(t => t && t.startsWith('http')).slice(0, n);
  }

  const icons = {
    folder: '<svg><use href="#ico-folder"/></svg>',
    film: '<svg><use href="#ico-film"/></svg>',
    user: '<svg><use href="#ico-user"/></svg>',
    tag: '<svg><use href="#ico-tag"/></svg>',
    play: '<svg><use href="#ico-play"/></svg>',
    empty: '<svg><use href="#ico-empty"/></svg>',
    edit: '<svg><use href="#ico-edit"/></svg>',
  };

  function folderIcon(depth) {
    if (depth === 0) return icons.film;
    if (depth === 1) return icons.tag;
    return icons.user;
  }

  function updateStats() {
    const ac = new Set(clips.map(c => c.anime)).size;
    document.getElementById('stats').innerHTML = `<strong>${clips.length}</strong> clips &middot; <strong>${ac}</strong> series`;
  }

  function updateBreadcrumb() {
    const el = document.getElementById('breadcrumb');
    let h = `<span class="bc-item ${path.length===0?'current':''}" onclick="nav(0)">All</span>`;
    path.forEach((p,i) => {
      h += `<span class="bc-sep">/</span>`;
      h += `<span class="bc-item ${i===path.length-1?'current':''}" onclick="nav(${i+1})">${esc(p)}</span>`;
    });
    el.innerHTML = h;
  }

  function transitionTo(fn) {
    const main = document.getElementById('main');
    main.classList.add('transitioning');
    setTimeout(() => { fn(); main.classList.remove('transitioning'); }, 180);
  }

  function nav(depth) { path = path.slice(0, depth); searchQ = ''; activeTag = ''; document.getElementById('search').value = ''; transitionTo(render); }
  function openDir(name) { path.push(name); transitionTo(render); }

  function render() {
    updateStats();
    updateBreadcrumb();
    const main = document.getElementById('main');
    const d = path.length;

    if (searchQ) { renderSearch(main); return; }

    // If a tag filter is active, show filtered clips globally
    if (activeTag) {
      const results = clips.filter(c =>
        Array.isArray(c.tags) && c.tags.some(t => t.toLowerCase() === activeTag.toLowerCase())
      );
      main.innerHTML = tagBarHtml() + sectionLabel(`Tag: ${activeTag}`, results.length) +
        (results.length ? `<div class="clip-grid">${results.map(c => clipCardHtml(c, true)).join('')}</div>` : emptyHtml('No clips with this tag', 'Try another tag.'));
      applyStagger();
      document.body.classList.toggle('admin-active', adminOpen);
      return;
    }

    if (d === 0) {
      const items = groupBy(clips, 'anime');
      if (!items.length) { main.innerHTML = emptyHtml('No clips yet', 'Open the Manage panel to add your first clip.'); return; }
      main.innerHTML = lastUpdatedHtml() + tagBarHtml() + sectionLabel('Series', items.length) + folderGridHtml(items, 0, () => true);
    } else if (d === 1) {
      const items = groupBy(clips.filter(c => c.anime === path[0]), 'sceneType');
      main.innerHTML = sectionLabel('Scene Types', items.length) + folderGridHtml(items, 1, c => c.anime === path[0]);
    } else if (d === 2) {
      const items = groupBy(clips.filter(c => c.anime === path[0] && c.sceneType === path[1]), 'character');
      main.innerHTML = sectionLabel('Characters', items.length) + folderGridHtml(items, 2, c => c.anime === path[0] && c.sceneType === path[1]);
    } else if (d === 3) {
      const list = clips.filter(c => c.anime === path[0] && c.sceneType === path[1] && c.character === path[2]);
      main.innerHTML = sectionLabel('Clips', list.length) + clipGridHtml(list);
    }

    applyStagger();
    document.body.classList.toggle('admin-active', adminOpen);
  }

  function lastUpdatedHtml() {
    if (!clips.length) return '';
    const dates = clips.map(c => c.addedAt).filter(Boolean).sort();
    const latest = dates[dates.length - 1];
    if (!latest) return '';
    return `<div class="last-updated">Last updated: ${esc(latest)}</div>`;
  }

  function tagBarHtml() {
    // Collect all unique tags across clips, count them
    const tagMap = {};
    clips.forEach(c => {
      if (Array.isArray(c.tags)) {
        c.tags.forEach(t => {
          const key = t.trim();
          if (key) tagMap[key] = (tagMap[key]||0) + 1;
        });
      }
    });
    const sorted = Object.entries(tagMap).sort((a,b) => b[1] - a[1]).slice(0, 20);
    if (!sorted.length) return '';

    let html = '<div class="tag-bar">';
    sorted.forEach(([tag, count]) => {
      const isActive = activeTag && activeTag.toLowerCase() === tag.toLowerCase();
      html += `<span class="tag-bar-pill${isActive ? ' active' : ''}" onclick="toggleTag('${tag.replace(/'/g, "\\'")}')">${esc(tag)}</span>`;
    });
    if (activeTag) {
      html += `<button class="tag-bar-clear" onclick="clearTag()">CLEAR</button>`;
    }
    html += '</div>';
    return html;
  }

  function toggleTag(tag) {
    if (activeTag && activeTag.toLowerCase() === tag.toLowerCase()) {
      activeTag = '';
    } else {
      activeTag = tag;
    }
    path = [];
    searchQ = '';
    document.getElementById('search').value = '';
    transitionTo(render);
  }

  function clearTag() {
    activeTag = '';
    transitionTo(render);
  }

  function sectionLabel(label, count) {
    return `<div class="section-label">${label} &middot; ${count}</div>`;
  }

  function folderGridHtml(items, depth, parentFilter) {
    const key = depth === 0 ? 'anime' : depth === 1 ? 'sceneType' : 'character';
    return `<div class="folder-grid">${items.map(([name, count]) => {
      const folderClips = clips.filter(c => parentFilter(c) && c[key] === name);
      const thumbs = getPreviewThumbs(folderClips, 3);
      const previewHtml = thumbs.length > 0
        ? thumbs.map(t => `<img src="${esc(t)}" alt="" onerror="this.style.display='none';">`).join('')
        : `<div class="folder-preview-empty">${icons.film}</div>`;
      return `
      <div class="folder" onclick="openDir('${String(name).replace(/'/g, "\\'")}')">
        <div class="folder-preview">${previewHtml}</div>
        <div class="folder-info">
          <div class="folder-info-left">
            <div class="folder-name">${esc(name)}</div>
            <div class="folder-count">${count} clip${count!==1?'s':''}</div>
          </div>
          <div class="folder-icon">${folderIcon(depth)}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function clipGridHtml(list) {
    return `<div class="clip-grid">${list.map(c => clipCardHtml(c)).join('')}</div>`;
  }

  function clipCardHtml(c, showPath) {
    const tags = Array.isArray(c.tags) ? c.tags : [];
    return `
      <div class="clip-wrapper">
        <div class="clip-action-btns">
          <button class="clip-btn clip-btn-edit" onclick="event.stopPropagation();openEditModal('${c.id}')">EDIT</button>
          <button class="clip-btn clip-btn-delete" onclick="event.stopPropagation();deleteClip('${c.id}')">DELETE</button>
        </div>
        <a class="clip-card" href="${esc(c.discordLink || '#')}" target="_blank" rel="noopener">
          <div class="clip-thumb-wrap">
            ${c.thumbnail
              ? `<img src="${esc(c.thumbnail)}" alt="${esc(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                 <div class="clip-thumb-fallback" style="display:none;position:absolute;inset:0;">${icons.film}</div>`
              : `<div class="clip-thumb-fallback">${icons.film}</div>`}
            <div class="clip-play-indicator">${icons.play}</div>
          </div>
          <div class="clip-body">
            <div class="clip-title">${esc(c.name || '')}</div>
            <div class="clip-tags">${tags.map(t => `<span class="clip-tag">${esc(t)}</span>`).join('')}</div>
            ${showPath ? `<div class="clip-path">${esc(c.anime||'')} / ${esc(c.sceneType||'')} / ${esc(c.character||'')}</div>` : ''}
            <div class="clip-date">${esc(c.addedAt || '')}</div>
          </div>
        </a>
      </div>`;
  }

  function renderSearch(main) {
    const q = searchQ.toLowerCase();
    const results = clips.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.anime||'').toLowerCase().includes(q) ||
      (c.character||'').toLowerCase().includes(q) ||
      (c.sceneType||'').toLowerCase().includes(q) ||
      (Array.isArray(c.tags) && c.tags.some(t => (t||'').toLowerCase().includes(q)))
    );
    if (!results.length) { main.innerHTML = emptyHtml('No matches', `Nothing found for "${esc(searchQ)}".`); return; }
    main.innerHTML = sectionLabel('Results', results.length) +
      `<div class="clip-grid">${results.map(c => clipCardHtml(c, true)).join('')}</div>`;
    applyStagger();
  }

  function emptyHtml(title, sub) {
    return `<div class="empty">${icons.empty}<div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
  }

  function applyStagger() {
    document.querySelectorAll('.folder, .clip-wrapper').forEach((el, i) => {
      el.style.animationDelay = (i * 0.04) + 's';
    });
  }

  function toggleAdmin() {
    adminOpen = !adminOpen;
    document.getElementById('adminPanel').classList.toggle('open', adminOpen);
    document.getElementById('manageBtn').classList.toggle('active', adminOpen);
    document.body.classList.toggle('admin-active', adminOpen);
  }

  function addClip() {
    const anime = document.getElementById('inp-anime').value.trim();
    const scene = document.getElementById('inp-scene').value.trim();
    const character = document.getElementById('inp-character').value.trim();
    const name = document.getElementById('inp-name').value.trim();
    const thumb = document.getElementById('inp-thumb').value.trim();
    const link = document.getElementById('inp-link').value.trim();
    const tagsStr = document.getElementById('inp-tags').value.trim();
    if (!anime || !scene || !character || !name || !link) { toast('Fill in all required fields', 'error'); return; }
    clips.push({ id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), anime, sceneType: scene, character, name, thumbnail: thumb, discordLink: link, tags: tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [], addedAt: new Date().toISOString().split('T')[0] });
    ['inp-anime','inp-scene','inp-character','inp-name','inp-thumb','inp-link','inp-tags'].forEach(id => document.getElementById(id).value = '');
    toast('Clip added — export JSON to save', 'success');
    render();
  }

  function deleteClip(id) {
    if (!confirm('Delete this clip?')) return;
    clips = clips.filter(c => c.id !== id);
    toast('Clip removed — export JSON to save', 'success');
    render();
  }

  function openEditModal(id) {
    const clip = clips.find(c => c.id === id);
    if (!clip) return;
    const tags = Array.isArray(clip.tags) ? clip.tags.join(', ') : '';
    document.getElementById('editModal').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeEditModal()">
        <div class="modal-box">
          <div class="modal-title">EDIT CLIP</div>
          <div class="form-grid">
            <div class="field"><label>Anime</label><input id="edit-anime" value="${esc(clip.anime||'')}"></div>
            <div class="field"><label>Scene Type</label><input id="edit-scene" value="${esc(clip.sceneType||'')}"></div>
          </div>
          <div class="form-grid">
            <div class="field"><label>Character</label><input id="edit-character" value="${esc(clip.character||'')}"></div>
            <div class="field"><label>Clip Name</label><input id="edit-name" value="${esc(clip.name||'')}"></div>
          </div>
          <div class="form-grid">
            <div class="field"><label>Thumbnail URL</label><input id="edit-thumb" value="${esc(clip.thumbnail||'')}"></div>
            <div class="field"><label>Discord Link</label><input id="edit-link" value="${esc(clip.discordLink||'')}"></div>
          </div>
          <div class="form-grid full">
            <div class="field"><label>Tags (comma-separated)</label><input id="edit-tags" value="${esc(tags)}"></div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="closeEditModal()">CANCEL</button>
            <button class="btn-primary" onclick="saveEdit('${id}')">SAVE CHANGES</button>
          </div>
        </div>
      </div>`;
  }

  function closeEditModal() { document.getElementById('editModal').innerHTML = ''; }

  function saveEdit(id) {
    const clip = clips.find(c => c.id === id);
    if (!clip) return;
    const anime = document.getElementById('edit-anime').value.trim();
    const scene = document.getElementById('edit-scene').value.trim();
    const character = document.getElementById('edit-character').value.trim();
    const name = document.getElementById('edit-name').value.trim();
    const thumb = document.getElementById('edit-thumb').value.trim();
    const link = document.getElementById('edit-link').value.trim();
    const tagsStr = document.getElementById('edit-tags').value.trim();
    if (!anime || !scene || !character || !name || !link) { toast('Fill in all required fields', 'error'); return; }
    clip.anime = anime; clip.sceneType = scene; clip.character = character;
    clip.name = name; clip.thumbnail = thumb; clip.discordLink = link;
    clip.tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];
    closeEditModal();
    toast('Clip updated — export JSON to save', 'success');
    render();
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(clips, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'data.json'; a.click(); URL.revokeObjectURL(a.href);
    toast('Exported to file', 'success');
  }

  function importData() { document.getElementById('importFile').click(); }

  function handleImport(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = function(ev) {
      try {
        const d = JSON.parse(ev.target.result);
        if (Array.isArray(d)) { clips = d; path = []; searchQ = ''; document.getElementById('search').value = ''; toast(`Imported ${clips.length} clips`, 'success'); render(); }
        else toast('Invalid format', 'error');
      } catch { toast('Invalid JSON file', 'error'); }
    };
    r.readAsText(file); e.target.value = '';
  }

  function handleSearch(v) { searchQ = v.trim(); activeTag = ''; render(); }

  function randomClip() {
    const withLinks = clips.filter(c => c.discordLink && c.discordLink !== '#');
    if (!withLinks.length) { toast('No clips available', 'error'); return; }
    const clip = withLinks[Math.floor(Math.random() * withLinks.length)];
    window.open(clip.discordLink, '_blank');
    toast(`Random: ${clip.name}`, 'success');
  }

  function toast(msg, type) {
    const old = document.querySelector('.toast'); if (old) old.remove();
    const t = document.createElement('div'); t.className = 'toast ' + (type||''); t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  // ── BACKGROUND SLIDESHOW (fullscreen crossfade) ──
  function initBgSlideshow() {
    const container = document.getElementById('bgSlideshow');
    const thumbs = clips.map(c => c.thumbnail).filter(t => t && t.startsWith('http'));
    if (thumbs.length === 0) return;

    const imgA = document.createElement('img');
    const imgB = document.createElement('img');
    imgA.className = 'bg-img'; imgB.className = 'bg-img';
    imgA.alt = ''; imgB.alt = '';
    container.appendChild(imgA); container.appendChild(imgB);

    let current = imgA, next = imgB, idx = 0;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
      return a;
    }

    let shuffled = shuffle(thumbs);
    function nextUrl() { const u = shuffled[idx]; idx++; if (idx >= shuffled.length) { shuffled = shuffle(thumbs); idx = 0; } return u; }

    imgA.src = nextUrl();
    imgA.onload = () => imgA.classList.add('active');

    setInterval(() => {
      const url = nextUrl();
      next.src = url;
      next.onload = () => {
        next.classList.add('active');
        current.classList.remove('active');
        const tmp = current; current = next; next = tmp;
      };
      next.onerror = () => next.classList.remove('active');
    }, 8000);
  }

  loadSharedData();
</script>
</body>
</html>
